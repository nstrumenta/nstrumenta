name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

env:
  IMAGE_VERSION_TAG: ${{ github.sha }}
  CI_WIF_PROVIDER: ${{ vars.CI_WIF_PROVIDER }}
  CI_SERVICE_ACCOUNT: ${{ vars.CI_SERVICE_ACCOUNT }}
  CI_PROJECT_ID: ${{ vars.CI_PROJECT_ID }}
  PROD_WIF_PROVIDER: ${{ vars.PROD_WIF_PROVIDER }}
  PROD_SERVICE_ACCOUNT: ${{ vars.PROD_SERVICE_ACCOUNT }}
  PROD_PROJECT_ID: ${{ vars.PROD_PROJECT_ID }}

permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    container: nstrumenta/base:latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: root-modules-${{ hashFiles('package.json') }}
      - run: npm install
      - run: npm run build
      - run: npm pack
      - name: Build and pack server
        run: |
          cd server/app
          npm install
          npm run build
          npm pack
          mv nst-server-*.tgz ../..
      - name: Collect build artifacts
        run: |
          mkdir -p build
          mv nstrumenta-*.tgz build/
          mv nst-server-*.tgz build/
      - uses: actions/upload-artifact@v4
        with:
          name: build
          path: |
            dist
            node_modules
            integration-tests
            package.json
            package-lock.json
            tsconfig.json
            src
            build

  build-frontend:
    runs-on: ubuntu-latest
    container: nstrumenta/base:latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: project
      - uses: actions/cache@v4
        with:
          path: project/frontend/node_modules
          key: frontend-modules-${{ hashFiles('project/frontend/package.json') }}
      - name: Install and build
        working-directory: project/frontend
        run: |
          ./use_cache_or_npm_install.sh
          npm run build
          ./build.sh
      - uses: actions/upload-artifact@v4
        with:
          name: frontend
          path: project/frontend/dist

  build-functions:
    runs-on: ubuntu-latest
    container: nstrumenta/base:latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: functions/node_modules
          key: functions-modules-${{ hashFiles('functions/package.json') }}
      - name: Install and build
        working-directory: functions
        run: |
          ./use_cache_or_npm_install.sh
          ./build.sh

  test-server:
    runs-on: ubuntu-latest
    container: nstrumenta/base:latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: server/app/node_modules
          key: server-modules-${{ hashFiles('server/app/package.json') }}
      - name: Install and test
        working-directory: server/app
        run: |
          npm install
          npm test

  test-nodejs:
    runs-on: ubuntu-latest
    container: nstrumenta/base:latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: root-modules-${{ hashFiles('package.json') }}
      - run: npm install
      - run: npm run test:client && npm run test:server

  test-vscode-extension:
    runs-on: ubuntu-latest
    container: nstrumenta/base:latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: root-modules-${{ hashFiles('package.json') }}
      - run: npm install
      - run: npm run build:vscode-extension
      - run: npm run test:vscode-extension

  build-ci-images:
    needs: [build-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: frontend
          path: frontend/dist
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.CI_WIF_PROVIDER }}
          service_account: ${{ env.CI_SERVICE_ACCOUNT }}
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-west1-docker.pkg.dev --quiet
      - name: Build and push CI images
        env:
          IMAGE_REPOSITORY: us-west1-docker.pkg.dev/${{ env.CI_PROJECT_ID }}/server
        run: ./build-ci-images.sh

  e2e:
    needs: [build-frontend]
    runs-on: ubuntu-latest
    env:
      CI: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: frontend
          path: frontend/dist
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.CI_WIF_PROVIDER }}
          service_account: ${{ env.CI_SERVICE_ACCOUNT }}
      - name: Configure gcloud for Playwright tests
        env:
          GOOGLE_CLOUD_PROJECT: ${{ env.CI_PROJECT_ID }}
        run: |
          mkdir -p $HOME/.config/gcloud
          cp $GOOGLE_APPLICATION_CREDENTIALS $HOME/.config/gcloud/application_default_credentials.json
          gcloud config set project $GOOGLE_CLOUD_PROJECT
      - uses: docker/setup-buildx-action@v3
      - name: Run Playwright tests
        env:
          GOOGLE_CLOUD_PROJECT: ${{ env.CI_PROJECT_ID }}
        run: cd integration-tests && ./e2e.sh

  # ---------------------------------------------------------------------------
  # CD: Deploy on merge to main
  # ---------------------------------------------------------------------------

  deploy-ci-frontend:
    needs: [build-frontend, build-ci-images]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: frontend
          path: frontend/dist
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.CI_WIF_PROVIDER }}
          service_account: ${{ env.CI_SERVICE_ACCOUNT }}
      - name: Read Firebase config from CI Cloud Run service
        id: firebase-config
        run: |
          ENV_YAML=$(gcloud run services describe cloudrun-service \
            --project=$CI_PROJECT_ID --region=us-west1 \
            --format='yaml(spec.template.spec.containers[0].env)')
          FIREBASE_API_KEY=$(echo "$ENV_YAML" | grep -A1 'name: FIREBASE_API_KEY' | grep 'value:' | awk '{print $2}')
          FIREBASE_APP_ID=$(echo "$ENV_YAML" | grep -A1 'name: FIREBASE_APP_ID' | grep 'value:' | awk '{print $2}')
          if [ -z "$FIREBASE_API_KEY" ] || [ -z "$FIREBASE_APP_ID" ]; then
            echo "::error::Failed to read Firebase config from cloudrun-service"
            exit 1
          fi
          echo "api_key=$FIREBASE_API_KEY" >> "$GITHUB_OUTPUT"
          echo "app_id=$FIREBASE_APP_ID" >> "$GITHUB_OUTPUT"
      - name: Inject config into frontend
        working-directory: frontend
        run: |
          FIREBASE_API_KEY=${{ steps.firebase-config.outputs.api_key }} \
          FIREBASE_APP_ID=${{ steps.firebase-config.outputs.app_id }} \
          GOOGLE_CLOUD_PROJECT=$CI_PROJECT_ID \
          BUILD_SHA=${{ github.sha }} \
          ./inject-config.sh
      - name: Deploy frontend to CI Firebase Hosting
        working-directory: frontend
        run: |
          npm install -g firebase-tools
          FIREBASE_PROJECT_ID=$CI_PROJECT_ID node makeFirebaseDeployConfig.js
          firebase use $CI_PROJECT_ID
          firebase deploy --only hosting

  deploy-ci-server:
    needs: [build-ci-images]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.CI_WIF_PROVIDER }}
          service_account: ${{ env.CI_SERVICE_ACCOUNT }}
      - name: Deploy server to CI Cloud Run
        run: |
          gcloud run deploy cloudrun-service \
            --project=$CI_PROJECT_ID \
            --image=us-west1-docker.pkg.dev/${{ env.CI_PROJECT_ID }}/server/server:${{ github.sha }} \
            --region=us-west1 \
            --port=5999 \
            --allow-unauthenticated \
            --update-env-vars="IMAGE_VERSION_TAG=$IMAGE_VERSION_TAG,GOOGLE_CLOUD_PROJECT=$CI_PROJECT_ID"

  deploy-frontend:
    needs: [build-frontend, test-server, test-nodejs]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: frontend
          path: frontend/dist
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.PROD_WIF_PROVIDER }}
          service_account: ${{ env.PROD_SERVICE_ACCOUNT }}
      - name: Read Firebase config from prod Cloud Run service
        id: firebase-config
        run: |
          ENV_YAML=$(gcloud run services describe cloudrun-service \
            --project=$PROD_PROJECT_ID --region=us-west1 \
            --format='yaml(spec.template.spec.containers[0].env)')
          FIREBASE_API_KEY=$(echo "$ENV_YAML" | grep -A1 'name: FIREBASE_API_KEY' | grep 'value:' | awk '{print $2}')
          FIREBASE_APP_ID=$(echo "$ENV_YAML" | grep -A1 'name: FIREBASE_APP_ID' | grep 'value:' | awk '{print $2}')
          if [ -z "$FIREBASE_API_KEY" ] || [ -z "$FIREBASE_APP_ID" ]; then
            echo "::error::Failed to read Firebase config from cloudrun-service"
            exit 1
          fi
          echo "api_key=$FIREBASE_API_KEY" >> "$GITHUB_OUTPUT"
          echo "app_id=$FIREBASE_APP_ID" >> "$GITHUB_OUTPUT"
      - name: Inject config into frontend
        working-directory: frontend
        run: |
          FIREBASE_API_KEY=${{ steps.firebase-config.outputs.api_key }} \
          FIREBASE_APP_ID=${{ steps.firebase-config.outputs.app_id }} \
          GOOGLE_CLOUD_PROJECT=$PROD_PROJECT_ID \
          BUILD_SHA=${{ github.sha }} \
          ./inject-config.sh
      - name: Deploy to Firebase Hosting
        working-directory: frontend
        run: |
          npm install -g firebase-tools
          FIREBASE_PROJECT_ID=$PROD_PROJECT_ID node makeFirebaseDeployConfig.js
          firebase use $PROD_PROJECT_ID
          firebase deploy --only hosting

  deploy-server:
    needs: [e2e, build-ci-images]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      CI_IMAGE: us-west1-docker.pkg.dev/${{ vars.CI_PROJECT_ID }}/server/server:${{ github.sha }}
      PROD_IMAGE: us-west1-docker.pkg.dev/${{ vars.PROD_PROJECT_ID }}/server/server:${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.CI_WIF_PROVIDER }}
          service_account: ${{ env.CI_SERVICE_ACCOUNT }}
      - name: Promote image to prod Artifact Registry
        run: |
          gcloud auth configure-docker us-west1-docker.pkg.dev --quiet
          docker pull $CI_IMAGE
          docker tag $CI_IMAGE $PROD_IMAGE
          docker push $PROD_IMAGE
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.PROD_WIF_PROVIDER }}
          service_account: ${{ env.PROD_SERVICE_ACCOUNT }}
      - name: Deploy to Cloud Run
        run: |
          gcloud run services update cloudrun-service \
            --project=$PROD_PROJECT_ID \
            --image=$PROD_IMAGE \
            --region=us-west1 \
            --update-env-vars="IMAGE_VERSION_TAG=$IMAGE_VERSION_TAG,GOOGLE_CLOUD_PROJECT=$PROD_PROJECT_ID"

  deploy-preview:
    needs: [build-frontend, build-ci-images]
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: frontend
          path: frontend/dist
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.CI_WIF_PROVIDER }}
          service_account: ${{ env.CI_SERVICE_ACCOUNT }}
      - name: Read Firebase config from CI Cloud Run service
        id: firebase-config
        run: |
          ENV_YAML=$(gcloud run services describe cloudrun-service \
            --project=$CI_PROJECT_ID --region=us-west1 \
            --format='yaml(spec.template.spec.containers[0].env)')
          FIREBASE_API_KEY=$(echo "$ENV_YAML" | grep -A1 'name: FIREBASE_API_KEY' | grep 'value:' | awk '{print $2}')
          FIREBASE_APP_ID=$(echo "$ENV_YAML" | grep -A1 'name: FIREBASE_APP_ID' | grep 'value:' | awk '{print $2}')
          if [ -z "$FIREBASE_API_KEY" ] || [ -z "$FIREBASE_APP_ID" ]; then
            echo "::error::Failed to read Firebase config from cloudrun-service"
            exit 1
          fi
          echo "api_key=$FIREBASE_API_KEY" >> "$GITHUB_OUTPUT"
          echo "app_id=$FIREBASE_APP_ID" >> "$GITHUB_OUTPUT"
          SERVICE_ACCOUNT=$(gcloud run services describe cloudrun-service \
            --project=$CI_PROJECT_ID --region=us-west1 \
            --format='value(spec.template.spec.serviceAccountName)')
          echo "service_account=$SERVICE_ACCOUNT" >> "$GITHUB_OUTPUT"
      - name: Deploy server to CI Cloud Run
        run: |
          gcloud run deploy pr-${{ github.event.number }} \
            --project=$CI_PROJECT_ID \
            --image=us-west1-docker.pkg.dev/${{ env.CI_PROJECT_ID }}/server/server:${{ github.sha }} \
            --region=us-west1 \
            --port=5999 \
            --allow-unauthenticated \
            --service-account=${{ steps.firebase-config.outputs.service_account }} \
            --update-env-vars="IMAGE_VERSION_TAG=$IMAGE_VERSION_TAG,GOOGLE_CLOUD_PROJECT=$CI_PROJECT_ID,FIREBASE_API_KEY=${{ steps.firebase-config.outputs.api_key }},FIREBASE_APP_ID=${{ steps.firebase-config.outputs.app_id }}"
      - name: Inject config into frontend
        working-directory: frontend
        run: |
          FIREBASE_API_KEY=${{ steps.firebase-config.outputs.api_key }} \
          FIREBASE_APP_ID=${{ steps.firebase-config.outputs.app_id }} \
          GOOGLE_CLOUD_PROJECT=$CI_PROJECT_ID \
          BUILD_SHA=${{ github.sha }} \
          ./inject-config.sh
      - name: Deploy frontend to Firebase Hosting preview channel
        id: deploy-hosting
        working-directory: frontend
        env:
          FIREBASE_PROJECT_ID: ${{ env.CI_PROJECT_ID }}
          CLOUD_RUN_SERVICE_ID: pr-${{ github.event.number }}
        run: |
          npm install -g firebase-tools
          node makeFirebaseDeployConfig.js
          firebase use $FIREBASE_PROJECT_ID
          DEPLOY_OUTPUT=$(firebase hosting:channel:deploy pr-${{ github.event.number }} \
            --expires 7d \
            --project $FIREBASE_PROJECT_ID 2>&1)
          echo "$DEPLOY_OUTPUT"
          CHANNEL_URL=$(echo "$DEPLOY_OUTPUT" | grep -oP 'Channel URL[^:]*:\s*\K\S+')
          if [ -z "$CHANNEL_URL" ]; then
            echo "::error::Failed to parse channel URL from firebase hosting output"
            exit 1
          fi
          echo "channel_url=$CHANNEL_URL" >> "$GITHUB_OUTPUT"
          rm firebase.json
      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        env:
          CI_PROJECT_ID: ${{ env.CI_PROJECT_ID }}
          CHANNEL_URL: ${{ steps.deploy-hosting.outputs.channel_url }}
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const projectId = process.env.CI_PROJECT_ID;
            const previewUrl = process.env.CHANNEL_URL;
            const marker = '<!-- preview-environment -->';
            const body = [
              marker,
              '| | Preview Environment |',
              '|---|---|',
              `| **Frontend** | [${previewUrl}](${previewUrl}) |`,
              '',
              `Deployed to CI project \`${projectId}\`. Preview channel expires after 7 days.`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }

  # ---------------------------------------------------------------------------
  # Release: Publish versioned artifacts on v* tags
  # ---------------------------------------------------------------------------

  publish-docker-hub:
    needs: [e2e, build-ci-images]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.CI_WIF_PROVIDER }}
          service_account: ${{ env.CI_SERVICE_ACCOUNT }}
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-west1-docker.pkg.dev --quiet
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
      - name: Pull, retag, and push images
        env:
          IMAGE_REPOSITORY: us-west1-docker.pkg.dev/${{ env.CI_PROJECT_ID }}/server
        run: |
          PACKAGE_VERSION=$(jq -r '.version' package.json)
          echo "Pulling and retagging images for version $PACKAGE_VERSION"
          for image in agent server data-job-runner; do
            echo "Processing $image..."
            docker pull $IMAGE_REPOSITORY/$image:$IMAGE_VERSION_TAG
            docker tag $IMAGE_REPOSITORY/$image:$IMAGE_VERSION_TAG nstrumenta/$image:$PACKAGE_VERSION
            docker tag $IMAGE_REPOSITORY/$image:$IMAGE_VERSION_TAG nstrumenta/$image:latest
            docker push nstrumenta/$image:$PACKAGE_VERSION
            docker push nstrumenta/$image:latest
          done

  publish-npm:
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    container: nstrumenta/base:latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: build
      - name: Publish to npm
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc
          npm publish
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-pypi:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Publish to PyPI
        working-directory: python
        run: |
          pip install build twine
          python -m build
          twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

  publish-vscode:
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    container: nstrumenta/base:latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: root-modules-${{ hashFiles('package.json') }}
      - run: npm install
      - name: Publish VS Code extension
        working-directory: vscode-extension
        run: |
          npm install
          npx vsce publish
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
