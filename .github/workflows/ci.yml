name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

env:
  IMAGE_VERSION_TAG: ${{ github.sha }}
  CI_WIF_PROVIDER: ${{ vars.CI_WIF_PROVIDER }}
  CI_SERVICE_ACCOUNT: ${{ vars.CI_SERVICE_ACCOUNT }}
  CI_PROJECT_ID: ${{ vars.CI_PROJECT_ID }}
  PROD_WIF_PROVIDER: ${{ vars.PROD_WIF_PROVIDER }}
  PROD_SERVICE_ACCOUNT: ${{ vars.PROD_SERVICE_ACCOUNT }}
  PROD_PROJECT_ID: ${{ vars.PROD_PROJECT_ID }}

permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    container: nstrumenta/base:latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: root-modules-${{ hashFiles('package.json') }}
      - run: npm install
      - run: npm run build
      - run: npm pack
      - name: Build and pack server
        run: |
          cd server/app
          npm install
          npm run build
          npm pack
          mv nst-server-*.tgz ../..
      - name: Collect build artifacts
        run: |
          mkdir -p build
          mv nstrumenta-*.tgz build/
          mv nst-server-*.tgz build/
      - uses: actions/upload-artifact@v4
        with:
          name: build
          path: |
            dist
            node_modules
            integration-tests
            package.json
            package-lock.json
            tsconfig.json
            src
            build

  build-frontend:
    runs-on: ubuntu-latest
    container: nstrumenta/base:latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: project
      - uses: actions/cache@v4
        with:
          path: project/frontend/node_modules
          key: frontend-modules-${{ hashFiles('project/frontend/package.json') }}
      - name: Install and build
        working-directory: project/frontend
        run: |
          ./use_cache_or_npm_install.sh
          npm run build
          ./build.sh
      - uses: actions/upload-artifact@v4
        with:
          name: frontend
          path: project/frontend/dist

  build-functions:
    runs-on: ubuntu-latest
    container: nstrumenta/base:latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: functions/node_modules
          key: functions-modules-${{ hashFiles('functions/package.json') }}
      - name: Install and build
        working-directory: functions
        run: |
          ./use_cache_or_npm_install.sh
          ./build.sh

  test-server:
    runs-on: ubuntu-latest
    container: nstrumenta/base:latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: server/app/node_modules
          key: server-modules-${{ hashFiles('server/app/package.json') }}
      - name: Install and test
        working-directory: server/app
        run: |
          npm install
          npm test

  test-nodejs:
    runs-on: ubuntu-latest
    container: nstrumenta/base:latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: root-modules-${{ hashFiles('package.json') }}
      - run: npm install
      - run: npm run test:client && npm run test:server

  test-vscode-extension:
    runs-on: ubuntu-latest
    container: nstrumenta/base:latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: root-modules-${{ hashFiles('package.json') }}
      - run: npm install
      - run: npm run build:vscode-extension
      - run: npm run test:vscode-extension

  build-ci-images:
    needs: [build, build-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: build
      - uses: actions/download-artifact@v4
        with:
          name: frontend
          path: frontend/dist
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.CI_WIF_PROVIDER }}
          service_account: ${{ env.CI_SERVICE_ACCOUNT }}
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-west1-docker.pkg.dev --quiet
      - name: Build and push CI images
        env:
          IMAGE_REPOSITORY: us-west1-docker.pkg.dev/${{ env.CI_PROJECT_ID }}/server
        run: ./build-ci-images.sh

  e2e:
    needs: [build-ci-images, build]
    runs-on: ubuntu-latest
    container: nstrumenta/ci:latest
    env:
      CI: true
      API_URL: http://localhost:5999
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: build
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.CI_WIF_PROVIDER }}
          service_account: ${{ env.CI_SERVICE_ACCOUNT }}
      - uses: google-github-actions/get-secretmanager-secrets@v2
        id: secrets
        with:
          secrets: |
            nstrumenta_api_key_pepper:${{ env.CI_PROJECT_ID }}/NSTRUMENTA_API_KEY_PEPPER
      - name: Start test server
        env:
          GOOGLE_CLOUD_PROJECT: ${{ env.CI_PROJECT_ID }}
          NSTRUMENTA_API_KEY_PEPPER: ${{ steps.secrets.outputs.nstrumenta_api_key_pepper }}
          FIREBASE_API_KEY: ${{ vars.CI_FIREBASE_API_KEY }}
          FIREBASE_APP_ID: ${{ vars.CI_FIREBASE_APP_ID }}
          IMAGE_VERSION_TAG: ${{ env.IMAGE_VERSION_TAG }}
        run: |
          npm install -g ./build/nst-server-*.tgz
          nst-server &
          echo "Waiting for server..."
          for i in $(seq 1 30); do
            curl -sf http://localhost:5999/health && break || sleep 2
          done
          echo "Server ready"
      - name: Generate API key and test user
        working-directory: integration-tests
        env:
          GOOGLE_CLOUD_PROJECT: ${{ env.CI_PROJECT_ID }}
        run: |
          npm install
          NSTRUMENTA_API_KEY=$(node create-api-key.js ci $API_URL)
          echo "::add-mask::$NSTRUMENTA_API_KEY"
          echo "NSTRUMENTA_API_KEY=$NSTRUMENTA_API_KEY" >> $GITHUB_ENV
          TEST_USER_JSON=$(node create-test-user.js)
          TEST_USER_EMAIL=$(echo "$TEST_USER_JSON" | jq -r .email)
          TEST_USER_PASSWORD=$(echo "$TEST_USER_JSON" | jq -r .password)
          echo "::add-mask::$TEST_USER_PASSWORD"
          echo "TEST_USER_EMAIL=$TEST_USER_EMAIL" >> $GITHUB_ENV
          echo "TEST_USER_PASSWORD=$TEST_USER_PASSWORD" >> $GITHUB_ENV
      - name: Install CLI
        run: npm install -g ./build/nstrumenta-*.tgz
      - name: Run CLI tests
        env:
          NSTRUMENTA_API_URL: ${{ env.API_URL }}
          NSTRUMENTA_API_KEY: ${{ env.NSTRUMENTA_API_KEY }}
        run: |
          cd integration-tests/cli/client/app
          npm install
          npm test
      - name: Run MCP integration tests
        working-directory: integration-tests/frontend
        env:
          NSTRUMENTA_API_KEY: ${{ env.NSTRUMENTA_API_KEY }}
        run: |
          npm install
          npx vitest run mcp-client.test.js
      - name: Run Playwright tests
        working-directory: integration-tests/frontend
        env:
          FRONTEND_URL: ${{ env.API_URL }}
          TEST_USER_EMAIL: ${{ env.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ env.TEST_USER_PASSWORD }}
        run: npx playwright test

  push-to-docker-hub:
    needs: [e2e]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.CI_WIF_PROVIDER }}
          service_account: ${{ env.CI_SERVICE_ACCOUNT }}
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-west1-docker.pkg.dev --quiet
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
      - name: Pull, retag, and push images
        env:
          IMAGE_REPOSITORY: us-west1-docker.pkg.dev/${{ env.CI_PROJECT_ID }}/server
        run: |
          PACKAGE_VERSION=$(jq -r '.version' package.json)
          echo "Pulling and retagging images for version $PACKAGE_VERSION"
          for image in agent server data-job-runner; do
            echo "Processing $image..."
            docker pull $IMAGE_REPOSITORY/$image:$IMAGE_VERSION_TAG
            docker tag $IMAGE_REPOSITORY/$image:$IMAGE_VERSION_TAG nstrumenta/$image:$PACKAGE_VERSION
            docker tag $IMAGE_REPOSITORY/$image:$IMAGE_VERSION_TAG nstrumenta/$image:latest
            docker push nstrumenta/$image:$PACKAGE_VERSION
            docker push nstrumenta/$image:latest
          done

  deploy-prod:
    needs: [push-to-docker-hub]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.PROD_WIF_PROVIDER }}
          service_account: ${{ env.PROD_SERVICE_ACCOUNT }}
      - run: gcloud --quiet config set project $PROD_PROJECT_ID
      - name: Deploy to prod Cloud Run
        run: |
          PACKAGE_VERSION=$(jq -r '.version' package.json)
          echo "Deploying nstrumenta/server:${PACKAGE_VERSION} to prod"
          gcloud run services update cloudrun-service \
            --image=nstrumenta/server:${PACKAGE_VERSION} \
            --region=us-west1 \
            --update-env-vars="IMAGE_VERSION_TAG=${PACKAGE_VERSION}"
      - name: Deploy frontend to Firebase Hosting
        run: |
          cd frontend
          npm ci
          npm run build
          FIREBASE_PROJECT_ID=$PROD_PROJECT_ID node makeFirebaseDeployConfig.js
          npx firebase use $PROD_PROJECT_ID
          npx firebase deploy --only hosting
