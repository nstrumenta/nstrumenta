<section class="mat-typography">
  <h2>Add New Project</h2>
  <mat-form-field class="project-name-input">
    <mat-label>Project Name</mat-label>
    <input matInput [(ngModel)]="projectName" [disabled]="isCreating">
  </mat-form-field>

  <mat-form-field class="project-name-input">
    <mat-label>Organization</mat-label>
    <mat-select [(ngModel)]="selectedOrgId" [disabled]="isCreating || organizations.length === 0">
      @for (org of organizations; track org.id) {
        <mat-option [value]="org.id">{{ org.name }}</mat-option>
      }
    </mat-select>
  </mat-form-field>

  @if (errorMessage) {
    <div class="error-message">
      <mat-error>{{ errorMessage }}</mat-error>
    </div>
  }

  <button
    mat-raised-button
    (click)="create()"
    [disabled]="!projectName || !selectedOrgId || isCreating"
    color="primary">
    @if (!isCreating) {
      <span>Create</span>
    }
    @if (isCreating) {
      <span>Creating...</span>
    }
  </button>
</section>
