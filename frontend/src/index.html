<!doctype html>
<html lang="en" class="dark-mode">

<head>
  <meta charset="utf-8">
  <title>nstrumenta</title>
  <base href="/">

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <script>
    // Apply saved theme before Angular boots to prevent flash
    (function() {
      const saved = localStorage.getItem('nst-theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const useDark = saved ? saved === 'dark' : prefersDark;
      document.documentElement.classList.toggle('dark-mode', useDark);
      document.documentElement.classList.toggle('light-mode', !useDark);
    })();
  </script>
</head>

<body>
  <app-root></app-root>
</body>

</html>
