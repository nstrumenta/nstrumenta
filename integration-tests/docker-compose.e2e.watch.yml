# Watch mode override for fast frontend iteration.
# Runs Angular dev server with hot reload instead of serving a built dist.
# Playwright tests run against the Angular dev server, which proxies API calls to the nstrumenta server.
#
# Start once:
#   docker compose -f docker-compose.e2e.yml -f docker-compose.e2e.watch.yml up -d server frontend-dev
#
# Then iterate (edit frontend code, run tests — no rebuild needed):
#   ./frontend-e2e-watch.sh tests/record.spec.js
services:
  frontend-dev:
    image: node:24-slim
    working_dir: /app
    volumes:
      - ../frontend:/app
      - /app/node_modules
    environment:
      - PROXY_TARGET=http://server:5999
      - NG_CACHE_PATH=/tmp/ng-cache-e2e
    command: sh -c "npm install && npx ng serve --host 0.0.0.0 --proxy-config proxy.conf.js"
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4200/').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 10s

  playwright:
    environment:
      - FRONTEND_URL=http://frontend-dev:4200
    volumes:
      - ./frontend:/app
      - playwright-node-modules:/app/node_modules
    depends_on:
      frontend-dev:
        condition: service_healthy

volumes:
  playwright-node-modules:
