name: nstrumenta-e2e

services:
  server:
    build:
      context: ../
      dockerfile: server/Dockerfile
      cache_from:
        - type=gha
      cache_to:
        - type=gha,mode=max
    environment:
      - GOOGLE_CLOUD_PROJECT=${GOOGLE_CLOUD_PROJECT}
      - FIREBASE_API_KEY=${FIREBASE_API_KEY}
      - FIREBASE_APP_ID=${FIREBASE_APP_ID}
      - NSTRUMENTA_API_KEY_PEPPER=${NSTRUMENTA_API_KEY_PEPPER}
      - NSTRUMENTA_API_URL=http://server:5999
    volumes:
      - ${HOME}/.config/gcloud:/root/.config/gcloud:ro
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:5999/health').then(() => process.exit(0)).catch(() => process.exit(1))"]
      interval: 2s
      timeout: 3s
      retries: 30
      start_period: 5s

  cli-tests:
    build:
      context: ../
      dockerfile: server/Dockerfile
    depends_on:
      server:
        condition: service_healthy
    environment:
      - GOOGLE_CLOUD_PROJECT=${GOOGLE_CLOUD_PROJECT}
      - NSTRUMENTA_API_KEY_PEPPER=${NSTRUMENTA_API_KEY_PEPPER}
      - NSTRUMENTA_SERVER_URL=http://server:5999
      - NSTRUMENTA_API_KEY=${NSTRUMENTA_API_KEY}
    volumes:
      - ./cli:/app/cli-tests
      - ${HOME}/.config/gcloud:/root/.config/gcloud:ro
    working_dir: /app/cli-tests/client/app
    command: sh -c 'npm install && npm test'

  playwright:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      server:
        condition: service_healthy
    environment:
      - FRONTEND_URL=http://server:5999
      - TEST_USER_EMAIL=${TEST_USER_EMAIL}
      - TEST_USER_PASSWORD=${TEST_USER_PASSWORD}
      - TEST_ADMIN_EMAIL=${TEST_ADMIN_EMAIL}
      - TEST_ADMIN_PASSWORD=${TEST_ADMIN_PASSWORD}
