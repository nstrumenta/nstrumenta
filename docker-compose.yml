services:
  frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
    ports:
      - 5008:5008
    working_dir: /app
    command: 'npm run serve:dist'
  server:
    build:
      context: .
      dockerfile: ./server/Dockerfile
    ports:
      - 5999:5999
    volumes:
      - ~/.config/gcloud:/gcp:ro
      - ./credentials/:/credentials
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/gcp/application_default_credentials.json
      - GOOGLE_CLOUD_PROJECT=${GOOGLE_CLOUD_PROJECT}
    command: 'npm run start'
  agent:
    build:
      context: .
      dockerfile: ./agent/Dockerfile
    ports:
      - 8088:8088
    environment:
      - NSTRUMENTA_API_KEY=${NSTRUMENTA_API_KEY}
    command: 'npm run start:agent'
  data-job-runner:
    build:
      context: .
      dockerfile: ./data-job-runner/Dockerfile
    image: nstrumenta/data-job-runner:latest
